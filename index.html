<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไม่ใช่แคลคูลัส</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="theme.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@100..900&family=Pridi:wght@200;300;400;500;600;700&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app">
        <div class="calculator">

            <div class="display">
                <div class="content">
                    <div class="input">
                        <div class="output"></div>
                    </div>
                </div>
            </div>

            <div class="keys">

                <div data-key="clear" class="key action">
                    <span>AC</span>
                </div>
                
                <div data-key="brackets" class="key action">
                    <span>( )</span>
                </div>

                <div data-key="%" class="key action">
                    <span>%</span>
                </div>

                <div data-key="/" class="key action">
                    <span>÷</span>
                </div>

                <div data-key="7" class="key action">
                    <span>7</span>
                </div>

                <div data-key="8" class="key action">
                    <span>8</span>
                </div>

                <div data-key="9" class="key action">
                    <span>9</span>
                </div>

                <div data-key="*" class="key action">
                    <span>×</span>

                <div data-key="4" class="key action">
                    <span>4</span>
                </div>

                <div data-key="5" class="key action">
                    <span>5</span>
                </div>

                <div data-key="6" class="key action">
                    <span>6</span>
                </div>

                <div data-key="-" class="key action">
                    <span>-</span>
                </div>

                <div data-key="1" class="key action">
                    <span>1</span>
                </div>

                <div data-key="2" class="key action">
                    <span>2</span>
                </div>

                <div data-key="3" class="key action">
                    <span>3</span>
                </div>

                <div data-key="+" class="key action">
                    <span>+</span>
                </div>

                <div data-key="backspace" class="key action">
                    <span>⌫</span>
                </div>

                <div data-key="0" class="key action">
                    <span>0</span>
                </div>

                <div data-key="." class="key action">
                    <span>.</span>
                </div>

                <div data-key="=" class="key action">
                    <span>=</span>
                </div>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>

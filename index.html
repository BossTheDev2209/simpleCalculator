<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ไม่ใช่แคลคูลัส</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="theme.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai+Looped:wght@100..900&family=Pridi:wght@200;300;400;500;600;700&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="body">
    <h1 class="title" style="text-align: center; font-size: 3rem;"><span style="color: var(--text-primary);">เครื่องคิดเลข</span><span style="color: var(--claude-cocoa);">ไฟ</span><span style="color: var(--claude-orange);">ไฟ</span><span style="color: var(--claude-orange-light);">ไฟ</span></h1>

    <button class="theme-toggle" id="theme-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon-icon lucide-moon"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
    </button>

    <!-- Calculator wrapper -->
    <div class="container">
        <div class="display">
            <div class="previous"></div>
            <div class="current"></div>
        </div>
        <div class="btn">
            <div class="num">
                    <button id="7">7</button>
                    <button id="8">8</button>
                    <button id="9">9</button>

                    <button id="4">4</button>
                    <button id="5">5</button>
                    <button id="6">6</button>

                    <button id="1">1</button>
                    <button id="2">2</button>
                    <button id="3">3</button>

                    <button id="0">+/-</button>
                    <button id="dot">.</button>
                    <button id="equals">=</button>
            </div>

            <div class="operator">
                <button id="clear">C</button>
                
                <button id="divide">÷</button>
                <button id="multiply">×</button>

                <button id="minus">-</button>
                <button id="add">+</button>

            </div>
        </div>
    </div>
    <!-- Calculator wrapper -->

</body>
</html>
